<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bestselling OSR modules on DriveThruRPG</title>
        <link rel="stylesheet" href="style.css">
        <script type="text/javascript" src="bestsellers.js"></script>
        <script type="importmap">
            {
              "imports": {
                "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
              }
            }
        </script>
    </head>
    <body id="app">
        <div v-for="group in groups" class="product-group">
            <div class="rank">{{ group.rank }}</div>
            <div class="products">
                <div v-for="product in group.products" class="product">
                    <div class="thumbnail">
                        <img :src="toImageUrl(product)" />
                    </div>
                    <div class="title">
                        {{ product.name }}
                    </div>
                </div>
            </div>
        </div>
    </body>

    <script type="module">
        import { createApp } from 'vue';

        createApp({
          data() {
            return { groups: data };
          },
          methods: {
            toImageUrl(product) {
              return "images/" + product.id;
            }
          }
        }).mount('#app')
    </script>
</html>
